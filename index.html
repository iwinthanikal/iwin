<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iwin | Official</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--black);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
        }

        .wrapper {
            max-width: 580px; /* Linktree-style narrow width for focus */
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        /* Hero Section */
        .header {
            margin-bottom: 50px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 8px;
            font-style: italic;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* Bio Section */
        .bio {
            font-size: 0.95rem;
            color: #ccc;
            font-weight: 300;
            margin-bottom: 60px;
            line-height: 1.8;
            padding: 0 10px;
        }

        /* Music Section */
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .video-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 40px;
            background: #080808;
            aspect-ratio: 16/9;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Linktree Style Buttons */
        .link-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            display: block;
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text-primary);
            text-decoration: none;
            padding: 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .link-item:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .link-item.primary {
            background: #ffffff;
            color: #000000;
            border: none;
        }

        /* Footer */
        footer {
            margin-top: 80px;
            color: #333;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Smooth Reveal Animation */
        .reveal {
            animation: fadeIn 1.2s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="wrapper reveal">
        <header class="header">
            <h1>iwin</h1>
            <p>Authentic • Dark • Real</p>
        </header>

        <p class="bio">
            Blending dark melodic sounds with raw Indian storytelling. 
            Defining a new era of authentic hip-hop.
        </p>

        <h3 class="section-title">Latest Release</h3>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/videoseries?list=PLLQs99HA6XgjPioO_nTq-6x6bK4RY1r6y" allowfullscreen></iframe>
        </div>

        <div class="link-container">
            <a href="https://www.youtube.com/@musicbyiwin/featured" target="_blank" class="link-item primary">Listen on YouTube</a>
            <a href="mailto:iwinthanikal@gmail.com" class="link-item">Work with iwin</a>
            <a href="#" class="link-item">SoundCloud</a>
        </div>

        <footer>
            &copy; 2026 IWIN ENTERPRISES
        </footer>
    </div>

</body>
</html>
